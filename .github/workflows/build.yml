name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      
      - name: Build Release
        working-directory: ./cli
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Rename binary
        id: rename
        run: |
          TARGET=${{ matrix.target }}
          SOURCE_DIR="cli/target/$TARGET/release"
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "$SOURCE_DIR/nscam.exe" "nscam-$TARGET.exe"
            echo "FILE=nscam-$TARGET.exe" >> $GITHUB_OUTPUT
          else
            cp "$SOURCE_DIR/nscam" "nscam-$TARGET"
            echo "FILE=nscam-$TARGET" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nscam-${{ matrix.target }}
          path: ${{ steps.rename.outputs.FILE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
